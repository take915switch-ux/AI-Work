<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピカチュウのてんつなぎ（1-20）</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fdfdfd;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #eee;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        svg {
            border: 1px solid #ddd;
            background-color: #fff;
            max-width: 100%;
            height: auto;
        }
        .dot {
            fill: #000;
        }
        .number {
            font-size: 16px;
            font-weight: bold;
            fill: #333;
        }
        .pre-drawn {
            fill: none;
            stroke: #ddd;
            stroke-width: 1;
            stroke-dasharray: 4;
        }
        .features {
            fill: #000;
        }
        .cheeks {
            fill: #FF0000;
        }
        .eye-white {
            fill: #FFFFFF;
        }
        @media print {
            .no-print {
                display: none;
            }
            body {
                padding: 0;
            }
            .container {
                box-shadow: none;
                border: none;
            }
        }
        .btn-print {
            background-color: #ffde00;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 0 #e6c700;
        }
        .btn-print:active {
            box-shadow: none;
            transform: translateY(4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ピカチュウのてんつなぎ</h1>
        <p>「1」からじゅんばんに せんを ひいてみよう！</p>
        
        <svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
            <!-- あらかじめ描いておく顔のパーツ -->
            <!-- 目 -->
            <circle cx="180" cy="280" r="15" class="features" />
            <circle cx="175" cy="275" r="5" class="eye-white" />
            <circle cx="320" cy="280" r="15" class="features" />
            <circle cx="315" cy="275" r="5" class="eye-white" />
            
            <!-- ほっぺ -->
            <circle cx="140" cy="340" r="25" class="cheeks" />
            <circle cx="360" cy="340" r="25" class="cheeks" />
            
            <!-- 鼻と口 -->
            <circle cx="250" cy="310" r="3" class="features" />
            <path d="M 230 330 Q 240 345 250 330 Q 260 345 270 330" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" />

            <!-- 点と数字 (1-20) -->
            <!-- 耳 (左) -->
            <circle cx="140" cy="80" r="4" class="dot" /> <text x="120" y="75" class="number">1</text> <!-- Tip L -->
            <circle cx="180" cy="180" r="4" class="dot" /> <text x="160" y="180" class="number">2</text> <!-- Base L Outer -->
            
            <!-- 頭頂部 -->
            <circle cx="250" cy="160" r="4" class="dot" /> <text x="250" y="150" class="number">3</text> <!-- Top -->
            
            <!-- 耳 (右) -->
            <circle cx="320" cy="180" r="4" class="dot" /> <text x="330" y="180" class="number">4</text> <!-- Base R Outer -->
            <circle cx="360" cy="80" r="4" class="dot" /> <text x="370" y="75" class="number">5</text> <!-- Tip R -->
            
            <!-- 右顔〜右腕 -->
            <circle cx="400" cy="250" r="4" class="dot" /> <text x="410" y="255" class="number">6</text>
            <circle cx="430" cy="350" r="4" class="dot" /> <text x="440" y="355" class="number">7</text>
            
            <!-- 右体〜しっぽ -->
            <circle cx="400" cy="450" r="4" class="dot" /> <text x="410" y="460" class="number">8</text>
            <circle cx="450" cy="460" r="4" class="dot" /> <text x="460" y="470" class="number">9</text>
            <circle cx="480" cy="400" r="4" class="dot" /> <text x="485" y="410" class="number">10</text>
            <circle cx="440" cy="360" r="4" class="dot" /> <text x="445" y="350" class="number">11</text>
            <circle cx="490" cy="300" r="4" class="dot" /> <text x="495" y="295" class="number">12</text>
            
            <!-- 右足〜下部 -->
            <circle cx="350" cy="540" r="4" class="dot" /> <text x="360" y="560" class="number">13</text>
            <circle cx="250" cy="560" r="4" class="dot" /> <text x="250" y="580" class="number">14</text>
            
            <!-- 左足〜左体 -->
            <circle cx="150" cy="540" r="4" class="dot" /> <text x="140" y="560" class="number">15</text>
            <circle cx="100" cy="450" r="4" class="dot" /> <text x="80" y="460" class="number">16</text>
            
            <!-- 左腕〜左顔 -->
            <circle cx="70" cy="350" r="4" class="dot" /> <text x="50" y="355" class="number">17</text>
            <circle cx="100" cy="250" r="4" class="dot" /> <text x="80" y="255" class="number">18</text>
            
            <!-- 顔の上部 -->
            <circle cx="130" cy="200" r="4" class="dot" /> <text x="110" y="200" class="number">19</text>
            <circle cx="160" cy="185" r="4" class="dot" /> <text x="145" y="175" class="number">20</text>
            
            <!-- 最後に1に戻るためのガイド（印刷時には見えないようにするか、番号を振る） -->
        </svg>

        <div class="no-print">
            <button class="btn-print" onclick="window.print()">いんさつ する</button>
            <p style="font-size: 0.9em; margin-top: 10px;">※A4サイズでいんさつするのがおすすめです。</p>
        </div>
    </div>
</body>
</html>
