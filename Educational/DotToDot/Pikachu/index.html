<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピカチュウ てんつなぎ</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #fdfdfd;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
        }
        #header {
            padding: 10px;
            background-color: #FFDE00;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 1.5rem; color: #333; }
        #game-container {
            position: relative;
            margin: 20px auto;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 5/6;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FF5252;
            margin-top: 20px;
            display: none;
            z-index: 10;
        }
        .controls { margin-top: 10px; }
        .btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #FF5252;
            color: white;
            box-shadow: 0 4px 0 #D32F2F;
            margin: 0 5px;
        }
        .btn:active { box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body>
    <div id="header">
        <h1>ピカチュウ てんつなぎ <span style="font-size: 0.6rem; opacity: 0.7;">v2.0</span></h1>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem;">１から じゅんばんに タッチしてね！</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">もういちど やる</button>
        <button class="btn" style="background-color: #9e9e9e; box-shadow: 0 4px 0 #616161;" onclick="location.href='../index.html'">もどる</button>
    </div>

    <div id="message">やったね！</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        const points = [
            { x: 140, y: 80 }, { x: 180, y: 180 }, { x: 250, y: 160 }, { x: 320, y: 180 }, { x: 360, y: 80 },
            { x: 400, y: 250 }, { x: 430, y: 350 }, { x: 400, y: 450 }, { x: 450, y: 460 }, { x: 480, y: 400 },
            { x: 440, y: 360 }, { x: 490, y: 300 }, { x: 350, y: 540 }, { x: 250, y: 560 }, { x: 150, y: 540 },
            { x: 100, y: 450 }, { x: 70, y: 350 }, { x: 100, y: 250 }, { x: 130, y: 200 }, { x: 160, y: 185 }
        ];

        let currentIndex = 0; let connectedPoints = []; let isComplete = false;

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr); draw();
        }

        function draw() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / 500; const scaleY = rect.height / 600;
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (connectedPoints.length > 1) {
                ctx.beginPath();
                ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = isComplete ? '#FFDE00' : '#333';
                ctx.moveTo(connectedPoints[0].x * scaleX, connectedPoints[0].y * scaleY);
                for (let i = 1; i < connectedPoints.length; i++) {
                    ctx.lineTo(connectedPoints[i].x * scaleX, connectedPoints[i].y * scaleY);
                }
                if (isComplete) ctx.lineTo(points[0].x * scaleX, points[0].y * scaleY);
                ctx.stroke();
            }

            if (isComplete) {
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#FFDE00';
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.moveTo(points[0].x * scaleX, points[0].y * scaleY);
                ctx.lineTo(165 * scaleX, 130 * scaleY); ctx.lineTo(130 * scaleX, 110 * scaleY);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(points[4].x * scaleX, points[4].y * scaleY);
                ctx.lineTo(335 * scaleX, 130 * scaleY); ctx.lineTo(370 * scaleX, 110 * scaleY);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = '#A1887F'; ctx.lineWidth = 10 * scaleX;
                ctx.beginPath();
                ctx.moveTo(350 * scaleX, 400 * scaleY); ctx.lineTo(390 * scaleX, 400 * scaleY);
                ctx.moveTo(355 * scaleX, 430 * scaleY); ctx.lineTo(395 * scaleX, 430 * scaleY);
                ctx.stroke();
            }

            drawFace(scaleX, scaleY);

            points.forEach((p, i) => {
                const x = p.x * scaleX; const y = p.y * scaleY;
                const isPast = (i < currentIndex || isComplete);
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = isPast ? '#333' : '#CCC'; ctx.fill();
                ctx.font = 'bold 18px Arial'; ctx.fillStyle = isPast ? '#333' : '#999';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, x, y - 20);
            });
        }

        function drawFace(scaleX, scaleY) {
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(180 * scaleX, 280 * scaleY, 12 * scaleX, 0, Math.PI * 2);
            ctx.arc(320 * scaleX, 280 * scaleY, 12 * scaleX, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(176 * scaleX, 276 * scaleY, 4 * scaleX, 0, Math.PI * 2);
            ctx.arc(316 * scaleX, 276 * scaleY, 4 * scaleX, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FF5252';
            ctx.beginPath(); ctx.arc(140 * scaleX, 340 * scaleY, 20 * scaleX, 0, Math.PI * 2);
            ctx.arc(360 * scaleX, 340 * scaleY, 20 * scaleX, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(250 * scaleX, 310 * scaleY, 2 * scaleX, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(230 * scaleX, 330 * scaleY);
            ctx.quadraticCurveTo(240 * scaleX, 345 * scaleY, 250 * scaleX, 330 * scaleY);
            ctx.quadraticCurveTo(260 * scaleX, 345 * scaleY, 270 * scaleX, 330 * scaleY); ctx.stroke();
        }

        function handleTouch(e) {
            if (isComplete) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = touch.clientX - rect.left; const y = touch.clientY - rect.top;
            const scaleX = rect.width / 500; const scaleY = rect.height / 600;
            const target = points[currentIndex];
            const dist = Math.sqrt((x - target.x * scaleX)**2 + (y - target.y * scaleY)**2);
            if (dist < 30) {
                connectedPoints.push(target); currentIndex++;
                if (currentIndex >= points.length) { isComplete = true; messageDiv.style.display = 'block'; }
                draw();
            }
        }

        window.addEventListener('resize', initCanvas);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); }, { passive: false });
        canvas.addEventListener('mousedown', handleTouch);
        setTimeout(initCanvas, 100);
        function resetGame() { currentIndex = 0; connectedPoints = []; isComplete = false; messageDiv.style.display = 'none'; draw(); }
    </script>
</body>
</html>
