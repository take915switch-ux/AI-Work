<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゼニガメ てんつなぎ</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #E0F7FA;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
        }
        #header {
            padding: 10px;
            background-color: #4FC3F7;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: white;
        }
        h1 { margin: 0; font-size: 1.5rem; }
        #game-container {
            position: relative;
            margin: 20px auto;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 5/6;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #0288D1;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
            pointer-events: none;
            z-index: 10;
        }
        .controls { margin-top: 10px; }
        .btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #0288D1;
            color: white;
            box-shadow: 0 4px 0 #01579B;
        }
        .btn:active { box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body>
    <div id="header">
        <h1>ゼニガメ てんつなぎ</h1>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem;">１から じゅんばんに タッチしてね！</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="message">やったね！</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">もういちど やる</button>
        <button class="btn" style="background-color: #9e9e9e; box-shadow: 0 4px 0 #616161;" onclick="location.href='../../../index.html'">もどる</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        // ゼニガメの点の座標 (1-20) - 500x600ベース
        // 頭、甲羅、手足の概形
        const points = [
            { x: 250, y: 100 }, // 1: 頭頂
            { x: 320, y: 130 }, // 2: 右おでこ
            { x: 350, y: 200 }, // 3: 右頬
            { x: 320, y: 270 }, // 4: 首右
            { x: 400, y: 300 }, // 5: 右手先
            { x: 350, y: 350 }, // 6: 右脇
            { x: 380, y: 450 }, // 7: 右甲羅下
            { x: 350, y: 530 }, // 8: 右足
            { x: 250, y: 550 }, // 9: お腹下
            { x: 150, y: 530 }, // 10: 左足
            { x: 100, y: 500 }, // 11: 尻尾先
            { x: 120, y: 450 }, // 12: 左甲羅下
            { x: 80, y: 350 },  // 13: 左脇
            { x: 50, y: 300 },  // 14: 左手先
            { x: 180, y: 270 }, // 15: 首左
            { x: 150, y: 200 }, // 16: 左頬
            { x: 180, y: 130 }, // 17: 左おでこ
            { x: 220, y: 110 }, // 18: 顔上1
            { x: 250, y: 115 }, // 19: 顔上2
            { x: 280, y: 110 }  // 20: 顔上3
        ];

        let currentIndex = 0;
        let connectedPoints = [];
        let isComplete = false;

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }

        function draw() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / 500;
            const scaleY = rect.height / 600;

            ctx.clearRect(0, 0, rect.width, rect.height);

            if (connectedPoints.length > 1) {
                ctx.beginPath();
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = isComplete ? '#4FC3F7' : '#333';
                ctx.moveTo(connectedPoints[0].x * scaleX, connectedPoints[0].y * scaleY);
                for (let i = 1; i < connectedPoints.length; i++) {
                    ctx.lineTo(connectedPoints[i].x * scaleX, connectedPoints[i].y * scaleY);
                }
                if (isComplete) ctx.lineTo(points[0].x * scaleX, points[0].y * scaleY);
                ctx.stroke();
            }

            if (isComplete) {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#B2EBF2';
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            drawFace(scaleX, scaleY);

            points.forEach((p, i) => {
                const x = p.x * scaleX;
                const y = p.y * scaleY;
                const isPast = (i < currentIndex || isComplete);

                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = isPast ? '#333' : '#CCC';
                ctx.fill();

                ctx.font = 'bold 18px Arial';
                ctx.fillStyle = isPast ? '#333' : '#999';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, x, y - 20);
            });
        }

        function drawFace(scaleX, scaleY) {
            // 目
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.ellipse(210 * scaleX, 190 * scaleY, 10 * scaleX, 15 * scaleY, 0, 0, Math.PI * 2);
            ctx.ellipse(290 * scaleX, 190 * scaleY, 10 * scaleX, 15 * scaleY, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(210 * scaleX, 185 * scaleY, 3 * scaleX, 0, Math.PI * 2);
            ctx.arc(290 * scaleX, 185 * scaleY, 3 * scaleX, 0, Math.PI * 2);
            ctx.fill();

            // 鼻
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(245 * scaleX, 215 * scaleY, 1.5 * scaleX, 0, Math.PI * 2);
            ctx.arc(255 * scaleX, 215 * scaleY, 1.5 * scaleX, 0, Math.PI * 2);
            ctx.fill();

            // 口
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(220 * scaleX, 235 * scaleY);
            ctx.quadraticCurveTo(250 * scaleX, 250 * scaleY, 280 * scaleX, 235 * scaleY);
            ctx.stroke();

            // 甲羅の模様（簡易的）
            if (isComplete) {
                ctx.strokeStyle = '#81D4FA';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200 * scaleX, 350 * scaleY);
                ctx.lineTo(300 * scaleX, 350 * scaleY);
                ctx.moveTo(250 * scaleX, 300 * scaleY);
                ctx.lineTo(250 * scaleX, 450 * scaleY);
                ctx.stroke();
            }
        }

        function handleTouch(e) {
            if (isComplete) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = (touch.clientX - rect.left);
            const y = (touch.clientY - rect.top);
            const scaleX = rect.width / 500;
            const scaleY = rect.height / 600;
            const target = points[currentIndex];
            const dist = Math.sqrt((x - target.x * scaleX)**2 + (y - target.y * scaleY)**2);
            if (dist < 30) {
                connectedPoints.push(target);
                currentIndex++;
                if (currentIndex >= points.length) {
                    isComplete = true;
                    messageDiv.style.display = 'block';
                }
                draw();
            }
        }

        window.addEventListener('resize', initCanvas);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); }, { passive: false });
        canvas.addEventListener('mousedown', handleTouch);
        setTimeout(initCanvas, 100);

        function resetGame() {
            currentIndex = 0; connectedPoints = []; isComplete = false;
            messageDiv.style.display = 'none'; draw();
        }
    </script>
</body>
</html>
