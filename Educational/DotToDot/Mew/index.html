<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ミュウ てんつなぎ</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background-color: #FCE4EC;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
        }
        #header {
            padding: 10px;
            background-color: #F06292;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: white;
        }
        h1 { margin: 0; font-size: 1.5rem; }
        #game-container {
            position: relative;
            margin: 20px auto;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 5/6;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            color: #D81B60;
            margin-top: 20px;
            display: none;
            z-index: 10;
        }
        .controls { margin-top: 10px; }
        .btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #F06292;
            color: white;
            box-shadow: 0 4px 0 #C2185B;
            margin: 0 5px;
        }
        .btn:active { box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body>
    <div id="header">
        <h1>ミュウ てんつなぎ <span style="font-size: 0.6rem; opacity: 0.7;">v2.0</span></h1>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem;">１から じゅんばんに タッチしてね！</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">もういちど やる</button>
        <button class="btn" style="background-color: #9e9e9e; box-shadow: 0 4px 0 #616161;" onclick="location.href='../index.html'">もどる</button>
    </div>

    <div id="message">やったね！</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        const points = [
            { x: 250, y: 150 }, { x: 320, y: 180 }, { x: 300, y: 230 }, { x: 330, y: 300 }, { x: 280, y: 320 },
            { x: 350, y: 450 }, { x: 280, y: 450 }, { x: 350, y: 530 }, { x: 450, y: 550 }, { x: 480, y: 400 },
            { x: 400, y: 300 }, { x: 250, y: 280 }, { x: 150, y: 450 }, { x: 180, y: 320 }, { x: 130, y: 300 },
            { x: 160, y: 230 }, { x: 140, y: 180 }, { x: 200, y: 160 }, { x: 250, y: 170 }, { x: 300, y: 160 }
        ];

        let currentIndex = 0; let connectedPoints = []; let isComplete = false;

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr); draw();
        }

        function draw() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / 500; const scaleY = rect.height / 600;
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (connectedPoints.length > 1) {
                ctx.beginPath();
                ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = isComplete ? '#F48FB1' : '#333';
                ctx.moveTo(connectedPoints[0].x * scaleX, connectedPoints[0].y * scaleY);
                for (let i = 1; i < connectedPoints.length; i++) {
                    ctx.lineTo(connectedPoints[i].x * scaleX, connectedPoints[i].y * scaleY);
                }
                if (isComplete) ctx.lineTo(points[0].x * scaleX, points[0].y * scaleY);
                ctx.stroke();
            }

            if (isComplete) {
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#FCE4EC'; ctx.fill();
                ctx.fillStyle = '#F48FB1'; ctx.beginPath();
                ctx.moveTo(points[10].x * scaleX, points[10].y * scaleY);
                ctx.quadraticCurveTo(350 * scaleX, 280 * scaleY, 250 * scaleX, 280 * scaleY);
                ctx.lineTo(300 * scaleX, 320 * scaleY); ctx.closePath(); ctx.fill();
            }

            drawFace(scaleX, scaleY);

            points.forEach((p, i) => {
                const x = p.x * scaleX; const y = p.y * scaleY;
                const isPast = (i < currentIndex || isComplete);
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = isPast ? '#333' : '#CCC'; ctx.fill();
                ctx.font = 'bold 18px Arial'; ctx.fillStyle = isPast ? '#333' : '#999';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, x, y - 20);
            });
        }

        function drawFace(scaleX, scaleY) {
            ctx.fillStyle = '#4FC3F7'; ctx.beginPath();
            ctx.ellipse(215 * scaleX, 230 * scaleY, 12 * scaleX, 18 * scaleY, 0.1, 0, Math.PI * 2);
            ctx.ellipse(285 * scaleX, 230 * scaleY, 12 * scaleX, 18 * scaleY, -0.1, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath();
            ctx.ellipse(218 * scaleX, 230 * scaleY, 6 * scaleX, 10 * scaleY, 0.1, 0, Math.PI * 2);
            ctx.ellipse(282 * scaleX, 230 * scaleY, 6 * scaleX, 10 * scaleY, -0.1, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath();
            ctx.arc(215 * scaleX, 222 * scaleY, 3 * scaleX, 0, Math.PI * 2);
            ctx.arc(285 * scaleX, 222 * scaleY, 3 * scaleX, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(250 * scaleX, 255 * scaleY, 1 * scaleX, 0, Math.PI * 2); ctx.fill();
        }

        function handleTouch(e) {
            if (isComplete) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = touch.clientX - rect.left; const y = touch.clientY - rect.top;
            const scaleX = rect.width / 500; const scaleY = rect.height / 600;
            const target = points[currentIndex];
            const dist = Math.sqrt((x - target.x * scaleX)**2 + (y - target.y * scaleY)**2);
            if (dist < 30) {
                connectedPoints.push(target); currentIndex++;
                if (currentIndex >= points.length) { isComplete = true; messageDiv.style.display = 'block'; }
                draw();
            }
        }

        window.addEventListener('resize', initCanvas);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); }, { passive: false });
        canvas.addEventListener('mousedown', handleTouch);
        setTimeout(initCanvas, 100);
        function resetGame() { currentIndex = 0; connectedPoints = []; isComplete = false; messageDiv.style.display = 'none'; draw(); }
    </script>
</body>
</html>
