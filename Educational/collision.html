<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D衝突シミュレーター</title>
    <style>
        :root {
            color-scheme: light;
            --paper: #f7f2e8;
            --surface: rgba(255, 252, 246, 0.92);
            --ink: #18222d;
            --muted: #5e6a74;
            --line: rgba(24, 34, 45, 0.12);
            --shadow: 0 10px 30px rgba(23, 31, 41, 0.1);
            --action: #265f5b;
            --action-hover: #1d4b47;
            --danger: #8f3d34;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--paper);
            color: var(--ink);
            font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--line);
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }

        #startBtn {
            background: var(--action);
            color: white;
        }

        #startBtn:hover {
            background: var(--action-hover);
        }

        #resetBtn {
            background: var(--line);
            color: var(--ink);
        }

        #resetBtn:hover {
            background: rgba(24, 34, 45, 0.2);
        }

        .info-panel {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>1D衝突シミュレーター</h1>
            <p>物体の質量と反発係数を設定して、衝突の様子を観察しましょう。</p>
        </header>

        <div class="layout">
            <div class="canvas-container">
                <canvas id="simCanvas"></canvas>
            </div>

            <aside class="controls">
                <div class="control-group">
                    <label>球の数</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="ballCount" value="2" checked> 2球</label>
                        <label class="radio-item"><input type="radio" name="ballCount" value="3"> 3球</label>
                    </div>
                </div>

                <div id="massControls">
                    <!-- Dynamic mass controls -->
                </div>

                <div class="control-group">
                    <label>反発係数 e: <span id="eValue">1.0</span></label>
                    <div class="slider-container">
                        <input type="range" id="eSlider" min="0" max="1" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="startBtn">スタート</button>
                    <button id="stopBtn">ストップ</button>
                    <button id="resetBtn">リセット</button>
                </div>
            </aside>
        </div>

        <div class="info-panel">
            <p>※ 一番左の球に初速度 $v$ を与えます。<br>
            ※ 質量 $m$ は相対的な比率を表しています。</p>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const eSlider = document.getElementById('eSlider');
        const eValueDisp = document.getElementById('eValue');
        const massControls = document.getElementById('massControls');
        const ballCountRadios = document.getElementsByName('ballCount');

        let balls = [];
        let animationId = null;
        let isRunning = false;
        let e = 1.0;

        // Configuration
        const RADIUS_BASE = 25;
        const INITIAL_V = 3.5;
        const FPS = 60;

        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            ballCountRadios.forEach(r => r.addEventListener('change', updateUI));
            eSlider.addEventListener('input', () => {
                e = parseFloat(eSlider.value);
                eValueDisp.textContent = e.toFixed(2);
            });

            startBtn.addEventListener('click', startSim);
            stopBtn.addEventListener('click', stopSim);
            resetBtn.addEventListener('click', resetSim);

            updateUI();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            if (!isRunning) draw();
        }

        function updateUI() {
            const count = parseInt(Array.from(ballCountRadios).find(r => r.checked).value);
            
            massControls.innerHTML = '<h2>質量設定</h2>';
            for (let i = 0; i < count; i++) {
                const group = document.createElement('div');
                group.className = 'control-group';
                group.innerHTML = `
                    <label>球 ${i + 1} の質量</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="mass${i}" value="1" ${i===0?'checked':''}> m</label>
                        <label class="radio-item"><input type="radio" name="mass${i}" value="2" ${i===1?'checked':''}> 2m</label>
                        <label class="radio-item"><input type="radio" name="mass${i}" value="3" ${i===2?'checked':''}> 3m</label>
                    </div>
                `;
                massControls.appendChild(group);

                // Add event listeners to mass radios to re-render on change
                const radios = document.getElementsByName(`mass${i}`);
                radios.forEach(r => r.addEventListener('change', resetSim));
            }
            resetSim();
        }

        function resetSim() {
            isRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            const count = parseInt(Array.from(ballCountRadios).find(r => r.checked).value);
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            
            balls = [];
            
            // Spacing balls
            // Ball 1: 1/4, Ball 2: 1/2, Ball 3: 3/4
            for (let i = 0; i < count; i++) {
                const mRatio = parseInt(Array.from(document.getElementsByName(`mass${i}`)).find(r => r.checked).value);
                const x = w * ( (i + 1) / (count + 1) );
                
                balls.push({
                    x: x,
                    y: h / 2,
                    v: 0,
                    m: mRatio,
                    radius: RADIUS_BASE + (mRatio - 1) * 5,
                    color: i === 0 ? '#e04e39' : (i === 1 ? '#366dcb' : '#0f9f8e')
                });
            }
            
            draw();
        }

        function startSim() {
            if (isRunning) return;
            isRunning = true;
            if (balls.every(b => b.v === 0)) {
                balls[0].v = INITIAL_V;
            }
            animate();
        }

        function stopSim() {
            isRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
        }

        function animate() {
            if (!isRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function update() {
            // Move balls
            balls.forEach(b => b.x += b.v);

            // Collision detection (sequential 1D)
            for (let i = 0; i < balls.length - 1; i++) {
                const b1 = balls[i];
                const b2 = balls[i+1];
                
                // Distance between centers
                const dist = b2.x - b1.x;
                const minDist = b1.radius + b2.radius;

                if (dist <= minDist && b1.v > b2.v) {
                    // Collision occurs
                    const v1 = b1.v;
                    const v2 = b2.v;
                    const m1 = b1.m;
                    const m2 = b2.m;

                    // Standard collision formulas
                    b1.v = (m1 * v1 + m2 * v2 - e * m2 * (v1 - v2)) / (m1 + m2);
                    b2.v = (m1 * v1 + m2 * v2 + e * m1 * (v1 - v2)) / (m1 + m2);
                    
                    // Prevent overlap sticking
                    const overlap = minDist - dist;
                    b1.x -= overlap * (m2 / (m1 + m2));
                    b2.x += overlap * (m1 / (m1 + m2));
                }
            }

            // Wall collision (optional, but keep them on screen)
            const w = canvas.width / window.devicePixelRatio;
            balls.forEach(b => {
                if (b.x - b.radius < 0) {
                    b.x = b.radius;
                    b.v = Math.abs(b.v) * e;
                }
                if (b.x + b.radius > w) {
                    b.x = w - b.radius;
                    b.v = -Math.abs(b.v) * e;
                }
            });
        }

        function draw() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            // Draw horizontal plane
            ctx.strokeStyle = 'var(--line)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, h/2 + RADIUS_BASE + 10);
            ctx.lineTo(w, h/2 + RADIUS_BASE + 10);
            ctx.stroke();

            balls.forEach((b, index) => {
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.beginPath();
                ctx.ellipse(b.x, h/2 + b.radius + 8, b.radius, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Ball
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Action point (dot)
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();

                // Mass Label (TeX-style m, 2m, 3m)
                ctx.fillStyle = 'white';
                ctx.font = 'italic 16px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const label = b.m === 1 ? 'm' : b.m + 'm';
                ctx.fillText(label, b.x, b.y);

                // Velocity Arrow and Label
                if (Math.abs(b.v) > 0.01) {
                    const arrowY = b.y - b.radius - 20;
                    drawArrow(b.x, arrowY, b.v * 15, b.color);
                    
                    // Velocity Text (e.g., vertical fraction of v)
                    const fraction = getFraction(b.v / INITIAL_V);
                    if (fraction !== '0') {
                        drawVelocityLabel(b.x + (b.v * 7.5), arrowY - 25, fraction, b.color);
                    }
                }
            });
        }

        function drawVelocityLabel(x, y, fraction, color) {
            ctx.fillStyle = color;
            ctx.font = 'italic 24px serif'; // 1.5x original (16 * 1.5 = 24)
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (!fraction.includes('/')) {
                // Integer value (e.g., v, 2v, -v)
                const label = (fraction === '1' ? '' : (fraction === '-1' ? '-' : fraction)) + 'v';
                ctx.fillText(label, x, y);
            } else {
                // Fraction value (e.g., 1/2v)
                const parts = fraction.split('/');
                const sign = parts[0].startsWith('-') ? '-' : '';
                const num = parts[0].replace('-', '');
                const den = parts[1];
                
                // Measure 'v' and sign to position it
                ctx.font = 'italic 24px serif';
                const vWidth = ctx.measureText('v').width;
                const signWidth = sign ? ctx.measureText(sign).width : 0;
                
                // Draw vertical fraction
                drawVerticalFraction(x - vWidth/2, y, sign, num, den, color);
                
                // Draw 'v' after the fraction
                ctx.font = 'italic 24px serif';
                ctx.fillText('v', x + (signWidth + 10)/2 + 5, y);
            }
        }

        function drawVerticalFraction(x, y, sign, num, den, color) {
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            
            const fontSize = 18; // Size for num/den (scaled proportionately)
            ctx.font = `italic ${fontSize}px serif`;
            
            const numWidth = ctx.measureText(num).width;
            const denWidth = ctx.measureText(den).width;
            const fracWidth = Math.max(numWidth, denWidth);
            
            let currentX = x - fracWidth / 2;

            if (sign) {
                ctx.font = 'italic 24px serif';
                ctx.fillText(sign, currentX - 10, y);
            }

            // Numerator
            ctx.font = `italic ${fontSize}px serif`;
            ctx.fillText(num, currentX, y - 10);
            
            // Denominator
            ctx.fillText(den, currentX, y + 10);
            
            // Fraction Bar
            ctx.beginPath();
            ctx.moveTo(currentX - fracWidth/2 - 2, y);
            ctx.lineTo(currentX + fracWidth/2 + 2, y);
            ctx.stroke();
        }

        function getFraction(val) {
            if (Math.abs(val) < 0.001) return '0';
            if (Math.abs(val - Math.round(val)) < 0.001) return Math.round(val).toString();
            
            // Continued fraction algorithm for better rational approximation
            let x = Math.abs(val);
            let a = Math.floor(x);
            let h1 = 1, h2 = a, k1 = 0, k2 = 1;
            const epsilon = 1e-4;
            
            while (Math.abs(x - a) > epsilon && Math.abs(val - h2 / k2) > epsilon) {
                x = 1 / (x - a);
                a = Math.floor(x);
                let h = a * h2 + h1;
                let k = a * k2 + k1;
                h1 = h2; h2 = h;
                k1 = k2; k2 = k;
                if (k2 > 100) break; // Limit denominator
            }
            
            const sign = val < 0 ? '-' : '';
            if (k2 === 1) return sign + h2.toString();
            return `${sign}${h2}/${k2}`;
        }

        function drawArrow(x, y, length, color) {
            if (Math.abs(length) < 5) return;
            const headlen = 10;
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + length, y);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + length, y);
            ctx.lineTo(x + length - headlen * Math.sign(length), y - headlen/2);
            ctx.lineTo(x + length - headlen * Math.sign(length), y + headlen/2);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        init();
    </script>
</body>
</html>
